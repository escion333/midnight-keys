<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Midnight Keys</title>
    <meta name="description" content="A gothic-themed browser piano and rhythm game. Play synth instruments and slay descending bats on the beat.">

    <!-- Open Graph / social banner -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://midnightkeys.tomsanee.com/">
    <meta property="og:title" content="Midnight Keys">
    <meta property="og:description" content="A gothic-themed browser piano and rhythm game. Play synth instruments and slay descending bats on the beat.">
    <meta property="og:image" content="https://midnightkeys.tomsanee.com/og-image.png">
    <meta property="og:image:width" content="2400">
    <meta property="og:image:height" content="1260">
    <meta property="og:image:alt" content="Midnight Keys — gothic piano with bats descending toward the keyboard">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Midnight Keys">
    <meta name="twitter:description" content="A gothic-themed browser piano and rhythm game. Play synth instruments and slay descending bats on the beat.">
    <meta name="twitter:image" content="https://midnightkeys.tomsanee.com/og-image.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Didact+Gothic&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="app" aria-label="Keyboard piano">
      <section class="panel">
        <div class="brand">
          <h1>Midnight Keys</h1>
        </div>

        <div class="controls" aria-label="Piano controls">
          <button class="start-button" id="start-game" type="button">Start</button>

          <label>
            Volume
            <input id="volume" type="range" min="0" max="1" step="0.01" value="0.72">
          </label>

          <label>
            Octave
            <input id="octave" type="number" min="2" max="6" value="4">
          </label>

          <label>
            Level
            <select id="level">
              <option value="apprentice" selected>Apprentice</option>
              <option value="adept">Adept</option>
              <option value="nightmare">Nightmare</option>
            </select>
          </label>

          <label>
            Song
            <select id="song">
              <optgroup label="Classics">
                <option value="diesIrae">Dies Irae</option>
                <option value="toccata">Toccata</option>
                <option value="mountainKing">Mountain King</option>
                <option value="moonlight">Moonlight</option>
              </optgroup>
              <optgroup label="Originals">
                <option value="midnightProcessional" selected>Midnight Processional</option>
                <option value="bloodMoonMarch">Blood Moon March</option>
                <option value="cathedralPanic">Cathedral Panic</option>
                <option value="vampireRave">Vampire Rave</option>
                <option value="finalCoffin">Final Coffin</option>
              </optgroup>
            </select>
          </label>

          <label>
            Sound
            <select id="instrument">
              <option value="harpsichord" selected>Harpsichord</option>
              <option value="churchOrgan">Church organ</option>
              <option value="cathedral">Gothic cathedral</option>
              <option value="warmPiano">Warm piano</option>
            </select>
          </label>

          <label class="toggle">
            <input id="sustain" type="checkbox">
            <span>Sustain</span>
          </label>
        </div>
      </section>

      <section class="game" aria-label="Gothic note game">
        <div class="stage" id="stage">
          <div class="moon"></div>
          <div class="hit-zone"></div>
        </div>
      </section>

      <section class="keyboard" id="keyboard" aria-label="Piano keys"></section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
